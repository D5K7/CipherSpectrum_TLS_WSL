seed: 42

data:
  root_dir: data
  ciphers:
    - aes-128-gcm
    - aes-256-gcm
    - chacha20-poly1305
  train_ciphers:
    - aes-128-gcm
    - aes-256-gcm
  test_ciphers:
    - chacha20-poly1305
  max_samples_per_domain_per_cipher: 1000
  split:
    train: 0.7
    val: 0.15
    test: 0.15
  max_packets: 40
  max_payload_bytes: 784
  handshake_packets: 8
  use_precomputed_features: true
  precomputed_dir: ""
  force_recompute_precomputed: false
  preload_train: false
  preload_val: true
  preload_test: true

features:
  mode: baseline  # baseline | payload_only | header_only | length_only | size_agnostic
  length_randomization_std: 0.0

training:
  model_name: mamba_lite  # transformer | mamba_lite
  batch_size: 64
  num_workers: 8
  prefetch_factor: 4
  persistent_workers: true
  epochs: 10
  learning_rate: 1e-3          # peak LR after warmup (Scheme A)
  weight_decay: 0.01
  amp: false
  inference_amp: true
  non_blocking_transfers: true
  compile_for_inference: true
  compile_mode: reduce-overhead
  gradient_clip_norm: 1.0
  early_stop_patience: 5
  # LR schedule
  warmup_epochs: 2
  min_learning_rate: 1e-6
  # LDAM + DRW (disabled: use standard CrossEntropy for baseline convergence)
  use_ldam: false
  ldam_max_margin: 0.5
  ldam_s: 30.0
  drw_start_epoch: 14
  # Adversarial debiasing (disabled for baseline)
  use_adversarial_debiasing: false
  adversarial_lambda: 0.1
  # Print one batch input min/max/nan stats for debugging data scaling issues
  debug_input_stats_once: false

evaluation:
  topk:
    - 1
    - 3

output:
  output_dir: outputs
  run_name: baseline_run
